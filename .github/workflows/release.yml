name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for Trusted Publishing
        run: |
          npm install -g npm@11
          npm --version

      - name: Resolve package metadata
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          TAG="${{ github.event.release.tag_name }}"
          EXPECTED="v$VERSION"
          if [[ "$TAG" != "$EXPECTED" ]]; then
            echo "::error::Release tag $TAG does not match package.json version $EXPECTED."
            exit 1
          fi
          echo "name=$NAME"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check npm registry
        id: npm_check
        shell: bash
        run: |
          set -euo pipefail
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Already on npm; skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download publish.zip from Release
        if: steps.npm_check.outputs.already_published == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern publish.zip \
            --dir .

      - name: Unpack publish/
        if: steps.npm_check.outputs.already_published == 'false'
        run: |
          set -euo pipefail
          mkdir -p publish
          unzip -q publish.zip -d publish
          test -f publish/GxMcp.Gateway.exe || { echo "::error::GxMcp.Gateway.exe missing in publish.zip"; exit 1; }
          test -f publish/worker/GxMcp.Worker.exe || { echo "::error::worker/GxMcp.Worker.exe missing in publish.zip"; exit 1; }

      - name: Install dependencies
        if: steps.npm_check.outputs.already_published == 'false'
        run: npm install

      - name: Enforce OIDC-only npm auth
        if: steps.npm_check.outputs.already_published == 'false'
        shell: bash
        run: |
          set -euo pipefail
          unset NODE_AUTH_TOKEN NPM_TOKEN
          if [[ -n "${NPM_CONFIG_USERCONFIG:-}" && -f "${NPM_CONFIG_USERCONFIG}" ]]; then
            sed -i '/_authToken/d' "${NPM_CONFIG_USERCONFIG}" || true
          fi
          OIDC_NPMRC="$RUNNER_TEMP/npmrc-oidc"
          {
            echo "registry=https://registry.npmjs.org/"
            echo "always-auth=false"
          } > "$OIDC_NPMRC"
          echo "NPM_CONFIG_USERCONFIG=$OIDC_NPMRC" >> "$GITHUB_ENV"

      - name: Publish to npm with provenance
        if: steps.npm_check.outputs.already_published == 'false'
        shell: bash
        run: |
          set -euo pipefail
          unset NODE_AUTH_TOKEN NPM_TOKEN
          npm publish --access public --provenance
